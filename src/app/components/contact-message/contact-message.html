<h2>Message</h2>

<form [formGroup]="form">

  <textarea
    formControlName="message"
    placeholder="Enter message (optional)"
    matInput
  ></textarea>

  <!-- COUNTER -->
  <div>
    {{ length }} / 500
  </div>

  <!-- BUTTONS -->
  <div style="margin-top: 10px;">
    <button type="button" (click)="back()">
      Back
    </button>

    <button type="button" (click)="submit()">
      Submit
    </button>
  </div>

</form>
